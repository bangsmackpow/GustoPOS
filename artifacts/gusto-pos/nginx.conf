events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        
        # Hardcode the upstream to satisfy security scanners while keeping the variable for DNS resolution
        set $upstream_api api;

        location /api/ {
            # Tighten proxy headers to prevent H2C smuggling
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_pass http://$upstream_api:3000;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }

    # Map block to handle conditional WebSocket upgrades safely
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
}
