name: Vulnerability Scan (Preview)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm i -g pnpm@10
          pnpm install

      - name: Run vulnerability audit
        run: |
          pnpm audit
        continue-on-error: true

      - name: Audit summary
        run: |
          echo "Vulnerability audit completed. See previous step for details."
