name: CI/CD Docker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare dependencies (no frozen lockfile)
        run: |
          npm i -g pnpm
          pnpm install --no-frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/gusto-pos-api:latest -f artifacts/api-server/Dockerfile .

      - name: Install PNPM
        run: npm i -g pnpm
      - name: Build Frontend dist on CI
        env:
          PORT: 5173
          BASE_PATH: /
          CI: true
        run: |
          pnpm run build --filter @workspace/gusto-pos
          ls -la artifacts/gusto-pos/dist/public
      - name: Build Frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/gusto-pos-frontend:latest -f artifacts/gusto-pos/Dockerfile .

      - name: Push API image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/gusto-pos-api:latest

      - name: Push Frontend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/gusto-pos-frontend:latest
