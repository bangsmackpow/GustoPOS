# Debian 12 (Bookworm) Silent Preseed for GustoPOS
# Locale and Keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i console-setup/ask_detect boolean false
d-i keyboard-configuration/xkb-keymap select us

# Network Configuration
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string gustopos
d-i netcfg/get_domain string local
d-i netcfg/link_wait_timeout string 10
d-i hw-detect/load_firmware boolean true

# Mirror Settings
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Account Setup
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Gusto User
d-i passwd/username string gustopos
d-i passwd/user-password password gustopos
d-i passwd/user-password-again password gustopos
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false
d-i passwd/user-default-groups string sudo

# Clock and Timezone
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# Partitioning
d-i partman-auto/method string regular
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Package Selection
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
tasksel tasksel/first multiselect ssh-server, standard
d-i pkgsel/include string curl wget sudo docker.io docker-compose openssl sqlite3
d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/update-policy select none

# Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string /dev/sda

# Late command to enable passwordless sudo for the 'gustopos' user
d-i preseed/late_command string \
    in-target /bin/sh -c "echo 'gustopos ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/gustopos && chmod 0440 /etc/sudoers.d/gustopos"

# Finalizing
d-i finish-install/reboot_in_progress note
