version: "3.9"
services:
  api-server:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: gustopos-api
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://gusto:gusto@db:5432/gusto
    ports:
      - "3000:3000"
    restart: unless-stopped

  gusto-pos:
    build:
      context: .
      dockerfile: artifacts/gusto-pos/Dockerfile
    container_name: gustopos-frontend
    ports:
      - "8080:80"
    depends_on:
      - api-server
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: gustopos-db
    restart: always
    environment:
      - POSTGRES_USER=gusto
      - POSTGRES_PASSWORD=gusto
      - POSTGRES_DB=gusto
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
