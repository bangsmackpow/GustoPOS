version: "3.9"
services:
  api:
    image: ghcr.io/bangsmackpow/gusto-pos-api:latest
    container_name: gustopos-api
    environment:
      - PORT=3000
      - DATABASE_URL=file:/app/data/gusto.db
    env_file:
      - stack.env
    volumes:
      - ./data:/app/data
    ports:
      - "3000:3000"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # API needs writable /app/data for SQLite and /tmp for Node.js internals
    read_only: true
    tmpfs:
      - /tmp
      - /run

  frontend:
    image: ghcr.io/bangsmackpow/gusto-pos-frontend:latest
    container_name: gustopos-frontend
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    # Nginx needs some writable paths for pid files and cache
    tmpfs:
      - /tmp
      - /run
      - /var/cache/nginx
