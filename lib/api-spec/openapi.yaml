openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: GustoPOS API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: users
    description: User management
  - name: ingredients
    description: Ingredient/inventory management
  - name: drinks
    description: Drink/menu management
  - name: tabs
    description: Tab/ticket management
  - name: orders
    description: Order line items
  - name: reports
    description: End-of-night reporting
  - name: settings
    description: App settings (currency, exchange rates)
  - name: tax-rates
    description: Tax rates management
  - name: promo-codes
    description: Promo codes management
  - name: staff-shifts
    description: Staff shift management
  - name: staff-performance
    description: Staff performance metrics
  - name: rushes
    description: Local events and traffic drivers
  - name: admin
    description: Admin operations (backup, reset)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      operationId: getCurrentAuthUser
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current auth user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetCurrentAuthUserResponse"

  /users:
    get:
      operationId: getUsers
      tags: [users]
      summary: List all staff users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffUser"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a staff user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUser"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a staff user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUser"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a staff user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffUser"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a staff user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /ingredients:
    get:
      operationId: getIngredients
      tags: [ingredients]
      summary: List all ingredients/inventory
      responses:
        "200":
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"
    post:
      operationId: createIngredient
      tags: [ingredients]
      summary: Create an ingredient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIngredientBody"
      responses:
        "201":
          description: Created ingredient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"

  /ingredients/{id}:
    get:
      operationId: getIngredient
      tags: [ingredients]
      summary: Get an ingredient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ingredient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"
    patch:
      operationId: updateIngredient
      tags: [ingredients]
      summary: Update an ingredient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIngredientBody"
      responses:
        "200":
          description: Updated ingredient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"
    delete:
      operationId: deleteIngredient
      tags: [ingredients]
      summary: Delete an ingredient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /drinks:
    get:
      operationId: getDrinks
      tags: [drinks]
      summary: List all drinks on the menu
      responses:
        "200":
          description: List of drinks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Drink"
    post:
      operationId: createDrink
      tags: [drinks]
      summary: Create a drink with recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDrinkBody"
      responses:
        "201":
          description: Created drink
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drink"

  /drinks/{id}:
    get:
      operationId: getDrink
      tags: [drinks]
      summary: Get a drink
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Drink
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drink"
    patch:
      operationId: updateDrink
      tags: [drinks]
      summary: Update a drink
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDrinkBody"
      responses:
        "200":
          description: Updated drink
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Drink"
    delete:
      operationId: deleteDrink
      tags: [drinks]
      summary: Delete a drink
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tabs:
    get:
      operationId: getTabs
      tags: [tabs]
      summary: List all open/recent tabs
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, closed, all]
        - name: shiftId
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of tabs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tab"
    post:
      operationId: createTab
      tags: [tabs]
      summary: Open a new tab
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTabBody"
      responses:
        "201":
          description: Created tab
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tab"

  /tabs/{id}:
    get:
      operationId: getTab
      tags: [tabs]
      summary: Get a tab with its orders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tab with orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TabWithOrders"
    patch:
      operationId: updateTab
      tags: [tabs]
      summary: Update a tab (close, rename, change payment)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTabBody"
      responses:
        "200":
          description: Updated tab
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tab"

  /tabs/{id}/close:
    post:
      operationId: closeTab
      tags: [tabs]
      summary: Close a tab and record payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloseTabBody"
      responses:
        "200":
          description: Closed tab
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tab"

  /tabs/{id}/orders:
    post:
      operationId: addOrderToTab
      tags: [orders]
      summary: Add an order item to a tab
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update an order item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Remove an order item from a tab
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /shifts:
    get:
      operationId: getShifts
      tags: [reports]
      summary: List all shifts
      responses:
        "200":
          description: List of shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shift"
    post:
      operationId: startShift
      tags: [reports]
      summary: Start a new shift
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartShiftBody"
      responses:
        "201":
          description: Created shift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  /shifts/active:
    get:
      operationId: getActiveShift
      tags: [reports]
      summary: Get the currently active shift
      responses:
        "200":
          description: Active shift or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShiftOrNull"

  /shifts/{id}/close:
    post:
      operationId: closeShift
      tags: [reports]
      summary: Close a shift (end of night)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                actualCashMxn:
                  type: number
      responses:
        "200":
          description: Closed shift
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shift"

  /reports/end-of-night/{shiftId}:
    get:
      operationId: getEndOfNightReport
      tags: [reports]
      summary: Get full end-of-night report for a shift
      parameters:
        - name: shiftId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: End of night report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndOfNightReport"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get app settings (exchange rates, display currency)
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

  /admin/backup:
    post:
      operationId: createManualBackup
      tags: [admin]
      summary: Create a manual backup
      responses:
        "200":
          description: Backup created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupResponse"

  /admin/backups:
    get:
      operationId: listBackups
      tags: [admin]
      summary: List all backups
      responses:
        "200":
          description: List of backups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupListResponse"

  /admin/backups/{id}/restore:
    post:
      operationId: restoreBackup
      tags: [admin]
      summary: Restore from a backup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backup restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/backups/{id}:
    delete:
      operationId: deleteBackup
      tags: [admin]
      summary: Delete a backup
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Backup deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/backup-settings:
    get:
      operationId: getBackupSettings
      tags: [admin]
      summary: Get backup settings
      responses:
        "200":
          description: Backup settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupSettings"

  /admin/backup/start-auto:
    post:
      operationId: startAutoBackup
      tags: [admin]
      summary: Start auto-backup
      responses:
        "200":
          description: Auto-backup started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/backup/shift-close:
    post:
      operationId: backupOnShiftClose
      tags: [admin]
      summary: Create backup on shift close
      responses:
        "200":
          description: Backup created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/reset-database:
    post:
      operationId: resetDatabase
      tags: [admin]
      summary: Reset database to fresh state
      responses:
        "200":
          description: Database reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /tax-rates:
    get:
      operationId: getTaxRates
      tags: [tax-rates]
      summary: Get all tax rates
      responses:
        "200":
          description: Tax rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTaxRatesResponse"

  /tax-rates/config:
    get:
      operationId: getTaxConfig
      tags: [tax-rates]
      summary: Get tax configuration
      responses:
        "200":
          description: Tax configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetTaxConfigResponse"

  /tax-rates/{category}:
    get:
      operationId: getTaxRateByCategory
      tags: [tax-rates]
      summary: Get tax rate by category
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tax rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxRate"
    post:
      operationId: updateTaxRate
      tags: [tax-rates]
      summary: Update tax rate
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaxRateBody"
      responses:
        "200":
          description: Updated tax rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateTaxRateResponse"

  /promo-codes/{code}:
    get:
      operationId: getPromoCodeByCode
      tags: [promo-codes]
      summary: Get promo code by code
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Promo code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromoCode"

  /tabs/{id}/apply-code:
    patch:
      operationId: applyPromoCodeToTab
      tags: [promo-codes]
      summary: Apply promo code to tab
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplyPromoCodeBody"
      responses:
        "200":
          description: Applied promo code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplyPromoCodeResponse"

  /staff-shifts/{shiftId}:
    get:
      operationId: getStaffShifts
      tags: [staff-shifts]
      summary: Get staff shifts for a shift
      parameters:
        - name: shiftId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Staff shifts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffShift"

  /staff-shifts/clock-in:
    post:
      operationId: clockInStaff
      tags: [staff-shifts]
      summary: Clock in staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockInBody"
      responses:
        "200":
          description: Clocked in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClockInResponse"

  /staff-shifts/clock-out:
    post:
      operationId: clockOutStaff
      tags: [staff-shifts]
      summary: Clock out staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClockOutBody"
      responses:
        "200":
          description: Clocked out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClockOutResponse"

  /staff-performance/{shiftId}:
    get:
      operationId: getStaffPerformance
      tags: [staff-performance]
      summary: Get staff performance metrics for a shift
      parameters:
        - name: shiftId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Staff performance metrics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffPerformance"

  /rushes:
    get:
      operationId: getRushes
      tags: [rushes]
      summary: List local events and rushes
      responses:
        "200":
          description: List of rushes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rush"
    post:
      operationId: postRushes
      tags: [rushes]
      summary: Create a new rush event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRushBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rush"

  /rushes/{id}:
    delete:
      operationId: deleteRushesId
      tags: [rushes]
      summary: Delete a rush event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    GetCurrentAuthUserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        isAuthenticated:
          type: boolean
      required:
        - isAuthenticated

    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, manager, head_bartender, bartender, server]
        language:
          type: string
          enum: [en, es]
      required:
        - id
        - role
        - language

    StaffUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        profileImageUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, manager, head_bartender, bartender, server]
        language:
          type: string
          enum: [en, es]
        pin:
          type: string
        password:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - role
        - language
        - isActive
        - createdAt

    CreateUserBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        username:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, employee]
        language:
          type: string
          enum: [en, es]
        pin:
          type: string
        password:
          type: ["string", "null"]
      required:
        - firstName
        - role
        - language
        - pin

    UpdateUserBody:
      type: object
      properties:
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        username:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, employee]
        language:
          type: string
          enum: [en, es]
        pin:
          type: ["string", "null"]
        password:
          type: ["string", "null"]
        isActive:
          type: ["boolean", "null"]

    Ingredient:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        nameEs:
          type: ["string", "null"]
        type:
          type: string
          enum: [spirit, beer, mixer, unit]
        subtype:
          type: ["string", "null"]
        baseUnit:
          type: string
          enum: [ml, g, unit]
        baseUnitAmount:
          type: number
        servingSize:
          type: number
        sellSingleServing:
          type: boolean
        singleServingPrice:
